version: "3"
services:
  env:
    build:
      context: .
      dockerfile: Env.Containerfile
    container_name: multirotor_env
    network_mode: host
    volumes:
      - type: bind
        source: ./
        target: /IARC-10
    working_dir: /IARC-10
    command: bash
    stdin_open: true
    tty: true 
  sim:
    environment:
      - OUT_PORT=14550
      - OUT_HOST=127.0.0.1
      - NUM_DRONES=1
    build:
      context: .
      dockerfile: Sim.Containerfile
    container_name: multirotor_sim
    network_mode: host
    stdin_open: true
    tty: true
    command: /ardupilot/Tools/autotest/sim_start_drones.sh ${NUM_DRONES}
